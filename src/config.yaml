weight_manager:
  model_class: "SimoNet"
  models_dir: "res/models"
  max_models: 100
  keep_latest: 20
  sampling_mode: "linear"   # "uniform" or "linear" or "exponential"

learning_loop:
  learning_rate: 1e-3        
  epochs: 10000
  games_per_epoch: 60
  hands_per_game: 32
  save_interval: 100
  save_every: 20
  checkpoint_dir: "res/checkpoint"
  num_workers: 8
  diversity_coef: 0.1
  diversity_lo: 0.01  
  diversity_hi: 0.99  