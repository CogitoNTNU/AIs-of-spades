weight_manager:
  model_class: "SimoNet"
  max_models: 100
  keep_latest: 20
  sampling_mode: "linear"   # "uniform" or "linear" or "exponential"
  checkpoint_dir: "res/action-reward-test2"

learning_loop:
  learning_rate: 3e-4
  lr_decay_steps: 100
  lr_decay_gamma: 0.97
  epochs: 100000
  games_per_epoch:
    0:     5
    30000: 10
    50000: 20
    80000: 30
  hands_per_game:
    0:     70
    30000: 50
    50000: 40
    80000: 30
  save_interval: 100
  num_workers: 8
  fold_lo: 0.05    # penalty se mean fold prob scende sotto questa soglia
  fold_hi: 0.50    # penalty se mean fold prob supera questa soglia
  fold_coef: 0.30  # coefficiente (scalato da reward_scale)
  call_lo: 0.05
  call_hi: 0.80
  call_coef: 0.10
  bet_lo: 0.05
  bet_hi: 0.80
  bet_coef: 0.10
  entropy_coef: 0.05
  action_baseline_window:
    0:      200
    30000:  100
    50000:  50
    80000:  25
  continuous_weight: 0.01
  grad_clip_norm: 1.0
  opponent_resample_interval:
    0:      1000   # early: master one opponent before moving on
    30000:  200
    50000:  100
    80000:   20   # late: fine-tune against fresh opponents frequently

game_loop:
  decadiment_factor: 0.8
  elimination_bonus:  40.0   # half average starting stack
  survival_bonus:    200.0   # rare event, strong global signal
  isolation_bonus:     5.0   # mild nudge toward heads-up play
  showdown_bonus:      2.0   # mild nudge toward staying in hands
  steal_bonus:         8.0   # reinforce uncontested aggression
  stack_lo:           50.0
  stack_hi:          200.0
  showdown_reward_multiplier_start:  2.0   # multiplier at epoch 0
  showdown_reward_multiplier_end:    1.0   # multiplier once decay is complete
  showdown_reward_multiplier_epochs: 30000 # epochs to reach end value (clamped after)